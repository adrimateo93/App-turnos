<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 30 20 L 50 10 L 70 20 L 70 45 C 70 60 50 75 50 75 C 50 75 30 60 30 45 Z" 
        fill="url(#shieldGradient)" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Checkmark inside shield -->
  <path d="M 40 42 L 47 50 L 60 32" 
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text -->
  <text x="85" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e293b">
    Seguri
  </text>
  <text x="200" y="45" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#3b82f6">
    Turno
  </text>
  
  <!-- Subtitle -->
  <text x="85" y="65" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
    Gestión de Turnos y Nóminas
  </text>
</svg>
