# ============================================================
# SeguriTurno — Configuración de Render
# Render detecta este archivo automáticamente al conectar el repo
# ============================================================

services:
  - type: web
    name: seguriturno-api
    runtime: python
    region: frankfurt      # más cercano a España
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false        # lo introduces manualmente en Render
      - key: DB_NAME
        value: seguriturno_db
      - key: JWT_SECRET
        sync: false        # lo introduces manualmente en Render
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false        # tu URL de Vercel
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
