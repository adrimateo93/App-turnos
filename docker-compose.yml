version: "3.9"

# ============================================================
# SeguriTurno — Docker Compose (Producción)
# Uso: docker compose up -d
# ============================================================

services:

  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: seguriturno-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
      MONGO_INITDB_DATABASE: seguriturno_db
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seguriturno-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/seguriturno_db?authSource=admin
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend React ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
        REACT_APP_NAME: SeguriTurno
        REACT_APP_VERSION: "2.0.0"
    container_name: seguriturno-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - public

  # ── Nginx Reverse Proxy (opcional, recomendado en prod) ──
  # nginx:
  #   image: nginx:alpine
  #   container_name: seguriturno-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./certs:/etc/nginx/certs
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - public

volumes:
  mongo_data:
    driver: local

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
